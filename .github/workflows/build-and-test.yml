name: Run unit tests

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - '**'

jobs:
  unit-tests:
    runs-on: cern-nextgen-h100
    container: registry.cern.ch/ngt-wp1.7/wp1.7-soa-wrapper@sha256:35a13a0022a5106b2fc3c2dfbb1056d65b88f6266084eb0a9e348003bc17f883
    steps:
      - uses: actions/checkout@v4
      - name: cpu_gcc
        env:
          CXX: g++
          CC: gcc
        run: |
          cmake -B ${{github.workspace}}/build -DENABLE_CUDA=OFF
          cmake --build ${{github.workspace}}/build
          ctest --test-dir ${{github.workspace}}/build/tests --output-on-failure
          rm -rf ${{github.workspace}}/build
      - name: cpu_clang
        env:
          CXX: clang++
          CC: clang
        run: |
          cmake -B ${{github.workspace}}/build -DENABLE_CUDA=OFF
          cmake --build ${{github.workspace}}/build
          ctest --test-dir ${{github.workspace}}/build/tests --output-on-failure
          rm -rf ${{github.workspace}}/build
      - name: gpu_gcc
        env:
          CXX: g++
          CC: gcc
          NVCC_CCBIN: gcc
          CUDACXX: nvcc
        run: |
          nvidia-smi
          cmake -B ${{github.workspace}}/build -DENABLE_CPU=OFF
          cmake --build ${{github.workspace}}/build
          ctest --test-dir ${{github.workspace}}/build/tests --output-on-failure
          rm -rf ${{github.workspace}}/build
      - name: gpu_clang
        env:
          CXX: clang++
          CC: clang
          NVCC_CCBIN: clang
          CUDACXX: nvcc
        run: |
          nvidia-smi
          cmake -B ${{github.workspace}}/build -DENABLE_CPU=OFF
          cmake --build ${{github.workspace}}/build
          ctest --test-dir ${{github.workspace}}/build/tests --output-on-failure
          rm -rf ${{github.workspace}}/build
