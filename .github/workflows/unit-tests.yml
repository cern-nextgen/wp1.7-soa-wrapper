name: Unit Tests

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - '**'

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

jobs:
  unit-tests:
    runs-on: cern-nextgen-h100
    container: registry.cern.ch/ngt-wp1.7/wp1.7-soa-wrapper@sha256:16432eae6635379637e67c4cc00334c46b6dce845b83da7e75fb754d24266897
    steps:
      - uses: actions/checkout@v4
        name: checkout repository
      - name: gcc
        env:
          CXX: g++
          CC: gcc
          NVCC_CCBIN: gcc
          CUDACXX: nvcc
          TEST_TAG: gcc
        run: &build-and-test |
          cmake -B ${{github.workspace}}/build/ -DBUILD_TESTING=ON -DCMAKE_COMPILE_WARNING_AS_ERROR=ON
          cmake --build ${{github.workspace}}/build/
          ctest --test-dir ${{github.workspace}}/build/tests --output-on-failure --output-junit /root/test_${TEST_TAG}.xml
          rm -rf ${{github.workspace}}/build
      - name: clang
        env:
          CXX: clang++
          CC: clang
          NVCC_CCBIN: clang
          CUDACXX: nvcc
          TEST_TAG: clang
        run: *build-and-test
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: junit-artifacts
          path: |
            /root/test_gcc.xml
            /root/test_clang.xml
  publish-test-results:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: download artifact
        uses: actions/download-artifact@v5
        with:
          name: junit-artifacts
      - name: publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: (!cancelled())
        with:
          files: "test_*.xml"
